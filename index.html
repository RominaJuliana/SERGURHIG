<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERGURIGH – Seguridad e Higiene</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>
:root{
--teal:#1e8a9a;
--navy:#0b2d36;
--gold:#d4a843;
--gray:#9ab4bc;
--cream:#f2ede6;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'DM Sans',sans-serif;
background:var(--navy);
color:var(--cream);
scroll-behavior:smooth;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:25px;
padding:15px;
background:#0b2d36ee;
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
color:var(--gray);
text-decoration:none;
font-weight:500;
transition:.3s;
position:relative;
}

nav a.active,
nav a:hover{
color:#fff;
}

nav a::after{
content:"";
position:absolute;
bottom:-5px;
left:0;
width:0;
height:2px;
background:var(--teal);
transition:.3s;
}

nav a:hover::after,
nav a.active::after{
width:100%;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
padding-top:60px;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:url("fondo.jpeg") center/cover no-repeat;
opacity:.25;
}

.hero-content{
position:relative;
z-index:2;
}

.hero img{
width:140px;
border-radius:50%;
margin-bottom:15px;
}

h1{
font-family:'Barlow Condensed';
font-size:4rem;
}

h1 span{color:var(--teal);}

.subtitle{
color:var(--gray);
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.btn-main{
background:var(--gold);
color:var(--navy);
}

.btn-outline{
border:1px solid var(--teal);
color:var(--teal);
}

.btn:hover{
transform:scale(1.05);
}

/* SECCIONES */
section{
padding:120px 20px;
max-width:1000px;
margin:auto;
}

h2{
font-size:2.2rem;
margin-bottom:20px;
}

.card{
background:#ffffff10;
padding:20px;
border-radius:15px;
margin-top:15px;
transition:.3s;
}

.card:hover{
background:#ffffff15;
transform:translateY(-5px);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.profile{
width:100%;
border-radius:15px;
}

/* CONTACTO */
input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#ffffff15;
color:white;
}

textarea{min-height:120px;}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
flex-wrap:wrap;
}

.whatsapp{
background:#25D366;
color:white;
border:none;
padding:10px 20px;
border-radius:30px;
cursor:pointer;
}

/* SOCIAL */
.social-icon{
font-size:1.5rem;
margin-left:10px;
color:var(--teal);
}

footer{
text-align:center;
padding:30px;
color:var(--gray);
}

/* ACTIVE SCROLL */
html{
scroll-padding-top:80px;
}

/* RESPONSIVE */
@media(max-width:768px){
.grid{grid-template-columns:1fr;}
h1{font-size:2.8rem;}
nav{flex-wrap:wrap;}
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<a href="#quienes" class="active">Quiénes</a>
<a href="#mision">Misión</a>
<a href="#normativa">Normativa</a>
<a href="#servicios">Servicios</a>
<a href="#contacto">Contacto</a>
</nav>

<!-- HERO -->
<div class="hero" id="inicio">
<div class="hero-content">
<img src="logo.jpeg">
<h1>SERGU<span>RIGH</span></h1>
<p class="subtitle">Servicio Integral de Seguridad e Higiene</p>

<a class="btn btn-main" href="#servicios">Ver Servicios</a>
<a class="btn btn-outline" href="#contacto">Contacto</a>
</div>
</div>

<!-- QUIÉNES -->
<section id="quienes">
<h2>Quiénes Somos</h2>

<div class="grid">
<div>
<img src="perfil.jpeg" class="profile">
</div>
